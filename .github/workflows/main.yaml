name: First Workflow

on:
  push:
    branches:
      - main

jobs:
  test-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Print Message
        run: echo "github actions working"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          

      - name: Run install check
        run: python -c "print('App Build Successful')"
  
  docker-build:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
       username: ${{secrets.DOCKER_USERNAME}}
       password: ${{secrets.DOCKER_PASSWORD}}

    - name: Build and push
      run: |
       docker build -t amanjsg02/flask-app .
       docker push amanjsg02/flask-app

